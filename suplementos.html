  <script>
// Day types per week (from training plan)

  ['descanso','corrida','corrida','corrida','descanso','corrida','descanso'],

const DAY_NAMES = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const DAY_SHORT = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

const SUPPS_BY_TYPE = {
  corrida: [
    {time:"5:30", name:"Artrozen", detail:"30 min antes da corrida", goal:"Tendões, cartilagem, articulações (anca!)", note:"Tomar 30 min antes do treino. Protege tendões e cartilagem da anca."},

    {time:"Almoço", name:"Creatina 5g", detail:"Com refeição", goal:"Força muscular, recuperação", note:"Segura e bem estudada. Tomar todos os dias."},
    {time:"Almoço", name:"Ómega-3 (EPA+DHA) 2-3g", detail:"Com refeição", goal:"Anti-inflamatório, saúde articular", note:"Tomar com gordura para melhor absorção."},

    {time:"Deitar", name:"Magnésio 300-400mg (490mg - WeightWorld Complex)", detail:"Bisglicinato", goal:"Recuperação muscular, sono, cãibras", note:"Melhor absorção que óxido. Ajuda no sono."}

    {time:"Manhã", name:"Artrozen", detail:"30 min antes do treino", goal:"Tendões, cartilagem, articulações (anca!)", note:"Tomar 30 min antes do treino."},

    {time:"Pós-treino", name:"Proteína Whey 25g + banana", detail:"Até 30 min após", goal:"Síntese proteica muscular, recuperação", note:"Janela anabólica pós-treino."},
    {time:"Almoço", name:"Creatina 5g", detail:"Com refeição", goal:"Força muscular, recuperação", note:"Tomar todos os dias."},
    {time:"Almoço", name:"Ómega-3 (EPA+DHA) 2-3g", detail:"Com refeição", goal:"Anti-inflamatório, saúde articular", note:"Tomar com gordura."},
    {time:"Almoço", name:"Vitamina D 2000-4000 UI", detail:"Com refeição (gordura)", goal:"Saúde óssea, muscular, imunidade", note:"Objetivo: 40-60 ng/mL."},
    {time:"Deitar", name:"Magnésio 300-400mg (490mg - WeightWorld Complex)", detail:"Bisglicinato", goal:"Recuperação muscular, sono, cãibras", note:"Ajuda no sono."}
  ],
  cross: [
    {time:"Manhã", name:"Artrozen", detail:"Manter rotina", goal:"Tendões, cartilagem, articulações (anca!)", note:"Manter mesmo sem impacto."},
    {time:"Manhã", name:"Vitamina C 500mg", detail:"Tomar com o Artrozen", goal:"Potencia síntese de colagénio", note:"Potencia a absorção do Artrozen."},
    {time:"Pós-treino", name:"Proteína Whey 25g + banana", detail:"Após a bike", goal:"Síntese proteica muscular, recuperação", note:"Proteína pós-treino mesmo em dias de bike."},
    {time:"Almoço", name:"Creatina 5g", detail:"Com refeição", goal:"Força muscular, recuperação", note:"Tomar todos os dias."},
    {time:"Almoço", name:"Ómega-3 (EPA+DHA) 2-3g", detail:"Com refeição", goal:"Anti-inflamatório, saúde articular", note:"Tomar com gordura."},
    {time:"Almoço", name:"Vitamina D 2000-4000 UI", detail:"Com refeição (gordura)", goal:"Saúde óssea, muscular, imunidade", note:"Objetivo: 40-60 ng/mL."},
    {time:"Deitar", name:"Magnésio 300-400mg (490mg - WeightWorld Complex)", detail:"Bisglicinato", goal:"Recuperação muscular, sono, cãibras", note:"Ajuda no sono."}
  ],
  descanso: [
    {time:"Manhã", name:"Artrozen", detail:"Manter mesmo em descanso", goal:"Tendões, cartilagem, articulações (anca!)", note:"Manter todos os dias."},
    {time:"Manhã", name:"Vitamina C 500mg", detail:"Tomar com o Artrozen", goal:"Potencia síntese de colagénio", note:"Potencia a absorção do Artrozen."},
    {time:"Almoço", name:"Creatina 5g", detail:"Com refeição", goal:"Força muscular, recuperação", note:"Manter saturação muscular."},
    {time:"Almoço", name:"Ómega-3 (EPA+DHA) 2-3g", detail:"Com refeição", goal:"Anti-inflamatório, saúde articular", note:"Tomar com gordura."},
    {time:"Almoço", name:"Vitamina D 2000-4000 UI", detail:"Com refeição (gordura)", goal:"Saúde óssea, muscular, imunidade", note:"Objetivo: 40-60 ng/mL."},
    {time:"Lanche", name:"Proteína 20g (se necessário)", detail:"Se ingestão baixa", goal:"Síntese proteica muscular", note:"Só se ingestão do dia for baixa."},
    {time:"Deitar", name:"Magnésio 300-400mg (490mg - WeightWorld Complex)", detail:"Bisglicinato", goal:"Recuperação muscular, sono, cãibras", note:"Manter sempre."}
  ]
};

function getWeekExtras(weekIdx) {
  const w = weekIdx + 1;
  let extras = [];
  if (w <= 2) extras.push({name:"Creatina fase de carga: 5g 2x/dia", detail:"Apenas semanas 1-2"});
  if (w <= 12) extras.push({name:"Glucosamina + Condroitina 1500mg + 1200mg", detail:"Suporte articular (anca)"});
  if (w >= 13 && w <= 19) {
    extras.push({name:"Tart Cherry 500mg (pós long run sábado)", detail:"Anti-inflamatório, reduz DOMS"});
    extras.push({name:"Curcumina 500-1000mg (após long runs >25km)", detail:"Anti-inflamatório articular"});
  }
  if (w >= 20) extras.push({name:"Beta-alanina 3-4g/dia (opcional)", detail:"Resistência muscular"});
  return extras;
}

function getPhase(weekIdx) {
  const w = weekIdx + 1;
  if (w <= 6) return {name:'Base', protein:'1,6 g/kg (~100g/dia)'};
  if (w <= 12) return {name:'Desenvolvimento', protein:'1,8 g/kg (~115g/dia)'};
  if (w <= 19) return {name:'Específica', protein:'2,0 g/kg (~127g/dia)'};
  return {name:'Taper', protein:'1,8 g/kg (~115g/dia)'};
}

const PLAN_START = new Date('2026-05-19');
let currentWeek = 0;
let currentDayIdx = 0;

function getCurrentWeekIndex() {
  const now = new Date();
  const diff = now - PLAN_START;
  const wk = Math.floor(diff / (7*24*60*60*1000));
  return Math.max(0, Math.min(wk, 24));
}

function getCurrentDayOfWeek() {
  const jsDay = new Date().getDay(); // 0=Sun
  // Convert to Mon=0 format
  return jsDay === 0 ? 6 : jsDay - 1;
}

function getState() { return JSON.parse(localStorage.getItem('maratona_supps') || '{}'); }
function saveState(s) { localStorage.setItem('maratona_supps', JSON.stringify(s)); }

function toggleSupp(idx) {
  const state = getState();
  const key = `w${currentWeek}-d${currentDayIdx}-${idx}`;
  state[key] = !state[key];
  saveState(state);
  renderDay();
}

function toggleExtra(idx) {
  const state = getState();
  const key = `w${currentWeek}-d${currentDayIdx}-extra-${idx}`;
  state[key] = !state[key];
  saveState(state);
  renderDay();
}

function renderWeekChips() {
  const container = document.getElementById('weekChips');
  container.innerHTML = Array.from({length:25}, (_, i) => {
    const active = i === currentWeek ? 'active' : '';
    return `<button class="chip ${active}" onclick="goToWeek(${i})">S${i+1}</button>`;
  }).join('');
  setTimeout(() => {
    const el = container.querySelector('.active');
    if (el) el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  }, 50);
}

function getWeekDates(weekIdx) {
  const start = new Date(PLAN_START);
  start.setDate(start.getDate() + weekIdx * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const startStr = `${start.getDate()} ${months[start.getMonth()]}`;
  const endStr = `${end.getDate()} ${months[end.getMonth()]}`;
  return `${startStr} - ${endStr}`;
}

function renderWeekNav() {
  const phase = getPhase(currentWeek);
  document.getElementById('weekTitle').textContent = `Semana ${currentWeek+1} — ${phase.name}`;
  document.getElementById('weekMeta').textContent = `${getWeekDates(currentWeek)} | Proteína: ${phase.protein}`;
  document.getElementById('prevBtn').disabled = currentWeek === 0;
  document.getElementById('nextBtn').disabled = currentWeek === 24;
}

function renderDayTabs() {
  const days = WEEK_DAYS[currentWeek];
  const container = document.getElementById('dayTabs');
  container.innerHTML = days.map((type, i) => {
    const active = i === currentDayIdx ? 'active' : '';
    const icon = type === 'corrida' ? '🏃' : type === 'strength' ? '💪' : type === 'cross' ? '🚴' : '😴';
    return `<button class="day-tab ${active}" onclick="selectDay(${i})">${DAY_SHORT[i]}<br>${icon}</button>`;
  }).join('');
}

function renderDay() {
  const dayType = WEEK_DAYS[currentWeek][currentDayIdx];
  let supps = JSON.parse(JSON.stringify(SUPPS_BY_TYPE[dayType]));
  const state = getState();
  const weekNum = currentWeek + 1;
  const typeLabel = dayType === 'corrida' ? 'Dia de Corrida' : dayType === 'strength' ? 'Dia de Strength' : dayType === 'cross' ? 'Cross (Bike)' : 'Descanso';

  // Fase 3 (semanas 13-19): proteína sobe para 30g + adicionar 20g ao deitar
  if (weekNum >= 13 && weekNum <= 19) {
    supps = supps.map(s => {
      if (s.name.includes('Proteína Whey 25g')) {
        return {...s, name: s.name.replace('25g', '30g'), note: 'Fase específica: dose aumentada para suportar volume alto.'};
      }
      return s;
    });
    if (dayType === 'corrida' || dayType === 'strength' || dayType === 'cross') {
      supps.push({time:"Deitar (antes do magnésio)", name:"Proteína 20g (caseína ou whey)", detail:"Dose extra fase 3", goal:"Recuperação nocturna", note:"Volume alto — aumentar ingestão proteica total para ~127g/dia."});
    }
  }

  let html = `<span class="day-type-badge ${dayType}">${typeLabel}</span>`;
  html += `<h3 class="section-title">${DAY_NAMES[currentDayIdx]}</h3>`;

  html += supps.map((s, i) => {
    const key = `w${currentWeek}-d${currentDayIdx}-${i}`;
    const isDone = state[key];
    return `
      <div class="supp-card ${isDone ? 'done' : ''}" onclick="toggleNote(this)">
        <button class="supp-check ${isDone ? 'checked' : ''}" onclick="event.stopPropagation();toggleSupp(${i})">✓</button>
        <div class="supp-info">
          <div class="supp-time">${s.time}</div>
          <div class="supp-name">${s.name}</div>
          <div class="supp-detail">${s.detail}</div>
          <div class="supp-goal">${s.goal}</div>
          <div class="supp-note">ℹ️ ${s.note}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('dayContent').innerHTML = html;
}

function selectDay(i) { currentDayIdx = i; renderDayTabs(); renderDay(); }
function goToWeek(i) { currentWeek = i; currentDayIdx = 0; render(); }
function prevWeek() { if (currentWeek > 0) { currentWeek--; currentDayIdx = 0; render(); } }
function nextWeek() { if (currentWeek < 24) { currentWeek++; currentDayIdx = 0; render(); } }

function render() {
  renderWeekChips();
  renderWeekNav();
  renderDayTabs();
  renderDay();
}

function toggleNav() {
  document.getElementById('sidenav').classList.toggle('open');
  document.getElementById('navOverlay').classList.toggle('open');
}

function clearSupps() {
  if (confirm('⚠️ Isto vai apagar TODOS os dados de suplementos marcados. Tens a certeza?')) {
    localStorage.removeItem('maratona_supps');
    toggleNav();
    renderDay();
  }
}

function toggleNote(el) {
  el.classList.toggle('expanded');
}

function exportSupps() {
  const state = getState();
  let csv = 'Semana,Dia,Suplemento,Tomado\n';
  for (let w = 0; w < 25; w++) {
    const days = WEEK_DAYS[w];
    days.forEach((dayType, d) => {
      if (dayType === 'descanso' && d === 6) return; // skip domingo from export
      const supps = SUPPS_BY_TYPE[dayType];
      supps.forEach((s, i) => {
        const key = `w${w}-d${d}-${i}`;
        const done = state[key] ? 'Sim' : 'Não';
        const name = s.name.replace(/,/g, ' ');
        csv += `${w+1},${DAY_NAMES[d]},${name},${done}\n`;
      });
    });
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  if (navigator.share) {
    const file = new File([csv], 'suplementos-progresso.csv', {type:'text/csv'});
    navigator.share({title:'Suplementos — Progresso', files:[file]}).catch(() => {
      const a = document.createElement('a'); a.href = url; a.download = 'suplementos-progresso.csv'; a.click();
    });
  } else {
    const a = document.createElement('a'); a.href = url; a.download = 'suplementos-progresso.csv'; a.click();
  }
