      border-radius: 10px;
      height: 8px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-bar .fill {
      background: #4ecca3;
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .stat { text-align: center; }
    .stat .value { font-size: 1.3rem; font-weight: 700; color: #4ecca3; }
    .stat .label { font-size: 0.65rem; opacity: 0.7; margin-top: 2px; }
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #16213e;
      position: sticky;
      top: 88px;
      z-index: 99;
    }
    .week-nav button {
      background: #0f3460;
      border: none;
      color: #eee;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .week-nav button:disabled { opacity: 0.3; }
    .week-nav .week-title { font-size: 0.95rem; font-weight: 600; }
    .week-nav .week-meta { font-size: 0.7rem; opacity: 0.7; }
    .week-content { padding: 8px 12px; }
    .day-card {
      background: #16213e;
      border-radius: 12px;
      margin-bottom: 8px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 4px solid #333;
      transition: opacity 0.2s;
    }
    .day-card.done { opacity: 0.5; }
    .day-card.done .day-desc { text-decoration: line-through; }
    .day-card[data-type="easy"] { border-left-color: #4ecca3; }
    .day-card[data-type="mp"] { border-left-color: #f9a825; }
    .day-card[data-type="tempo"] { border-left-color: #ff6b35; }
    .day-card[data-type="intervals"] { border-left-color: #e94560; }
    .day-card[data-type="long"] { border-left-color: #7b68ee; }
    .day-card[data-type="long+mp"] { border-left-color: #9c27b0; }
    .day-card[data-type="strength"] { border-left-color: #00bcd4; }
    .day-card[data-type="cross"] { border-left-color: #8bc34a; }
    .day-card[data-type="rest"] { border-left-color: #555; }
    .day-card[data-type="recovery"] { border-left-color: #80cbc4; }
    .day-card[data-type="strides"] { border-left-color: #4ecca3; }
    .day-card[data-type="maratona"] { border-left-color: #ffd700; }
    .check-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #555;
      background: transparent;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 14px;
    }
    .check-btn.checked {
      background: #4ecca3;
      border-color: #4ecca3;
      color: #1a1a2e;
    }
    .day-info { flex: 1; min-width: 0; }

      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }

    .day-km { font-size: 0.75rem; color: #4ecca3; font-weight: 600; }
    .day-type {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .day-desc {
      font-size: 0.75rem;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .day-pace { font-size: 0.7rem; opacity: 0.6; margin-top: 2px; }
    .week-chips {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;

    .chip {
      background: #0f3460;

      color: #eee;

      font-size: 0.7rem;
      white-space: nowrap;

    .legend {

      opacity: 0.7;

// State
let currentWeek = 0;
let completed = JSON.parse(localStorage.getItem('maratona_completed') || '{}');

// Race date
const RACE_DATE = new Date('2026-11-08');
const PLAN_START = new Date('2026-05-19');

function getDaysUntilRace() {
  const now = new Date();
  const diff = RACE_DATE - now;
  return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
}

function getCurrentWeekIndex() {
  const now = new Date();
  const diff = now - PLAN_START;
  const weekNum = Math.floor(diff / (7*24*60*60*1000));
  return Math.max(0, Math.min(weekNum, PLAN.length - 1));
}

function getCompletedCount() {
  return Object.values(completed).filter(v => v).length;
}

function getCompletedKm() {
  let km = 0;
  for (const key in completed) {
    if (!completed[key]) continue;
    const [w, d] = key.split('-').map(Number);
    const week = PLAN[w];
    if (week && week.days[d]) km += week.days[d].km;
  }
  return km;
}

function getTotalSessions() {
  return PLAN.reduce((sum, w) => sum + w.days.filter(d => d.type !== 'rest').length, 0);
}

function updateStats() {
  const done = getCompletedCount();
  const total = getTotalSessions();
  document.getElementById('statDone').textContent = done;
  document.getElementById('statKm').textContent = Math.round(getCompletedKm());
  document.getElementById('statWeek').textContent = currentWeek + 1;
  document.getElementById('statDays').textContent = getDaysUntilRace();
  document.getElementById('progressFill').style.width = `${(done/total*100).toFixed(1)}%`;
}

function renderWeekChips() {
  const container = document.getElementById('weekChips');
  container.innerHTML = PLAN.map((w, i) => {
    const active = i === currentWeek ? 'active' : '';
    const label = w.note ? `S${w.week} ${w.note}` : `S${w.week}`;
    return `<button class="chip ${active}" onclick="goToWeek(${i})">${label}</button>`;
  }).join('');
  // Scroll to active chip
  setTimeout(() => {
    const activeChip = container.querySelector('.active');
    if (activeChip) activeChip.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 50);
}

function renderWeek() {
  const week = PLAN[currentWeek];
  document.getElementById('weekTitle').textContent = `Semana ${week.week} — ${week.km} km`;
  document.getElementById('weekMeta').textContent = `${week.dates} | ${week.phase} ${week.note}`;
  document.getElementById('prevWeek').disabled = currentWeek === 0;
  document.getElementById('nextWeek').disabled = currentWeek === PLAN.length - 1;

  const container = document.getElementById('weekContent');
  container.innerHTML = week.days.map((day, i) => {
    const key = `${currentWeek}-${i}`;
    const isDone = completed[key];
    const doneClass = isDone ? 'done' : '';
    const checkedClass = isDone ? 'checked' : '';
    const kmText = day.km > 0 ? `${day.km} km` : '';
    return `
      <div class="day-card ${doneClass}" data-type="${day.type}">
        <button class="check-btn ${checkedClass}" onclick="toggleDay('${key}')">✓</button>
        <div class="day-info">
          <div class="day-header">
            <span class="day-name">${day.day}</span>
            <span class="day-km">${kmText}</span>
          </div>
          <div class="day-type">${formatType(day.type)}</div>
          <div class="day-desc">${day.desc}</div>
          <div class="day-pace">${day.pace}</div>
        </div>
      </div>
    `;
  }).join('');

  renderWeekChips();
  updateStats();
}

function formatType(type) {
  const map = {
    'easy':'Easy','mp':'Marathon Pace','tempo':'Tempo','intervals':'Intervalos',
    'long':'Long Run','long+mp':'Long Run + MP','strength':'Strength',
    'cross':'Cross (Bike)','rest':'Descanso','recovery':'Recovery',
    'strides':'Easy + Strides','maratona':'🏁 MARATONA'
  };
  return map[type] || type;
}

function toggleDay(key) {
  completed[key] = !completed[key];
  localStorage.setItem('maratona_completed', JSON.stringify(completed));
  renderWeek();
}

function goToWeek(i) {
  currentWeek = i;
  renderWeek();
}

document.getElementById('prevWeek').addEventListener('click', () => {
  if (currentWeek > 0) { currentWeek--; renderWeek(); }
});
document.getElementById('nextWeek').addEventListener('click', () => {
  if (currentWeek < PLAN.length - 1) { currentWeek++; renderWeek(); }
});

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 80) {
    if (diff < 0 && currentWeek < PLAN.length - 1) { currentWeek++; renderWeek(); }
    if (diff > 0 && currentWeek > 0) { currentWeek--; renderWeek(); }
  }
});

// Init
currentWeek = getCurrentWeekIndex();
renderWeek();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
